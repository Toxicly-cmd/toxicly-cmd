<svg fill="none" viewBox="0 0 800 200" width="800" height="200" xmlns="http://www.w3.org/2000/svg">
	<foreignObject width="100%" height="100%">
		<div xmlns="http://www.w3.org/1999/xhtml">
			<style>
				@keyframes rotate {
					0% { background-position: 0% 50%; }
					50% { background-position: 100% 50%; }
					100% { background-position: 0% 50%; }
				}
				@keyframes pulse {
					0%, 100% { opacity: 0.8; filter: drop-shadow(0 0 5px #BB86FC); }
					50% { opacity: 1; filter: drop-shadow(0 0 20px #03DAC6); }
				}
				.container {
					font-family: 'Outfit', sans-serif;
					width: 100%;
					height: 200px;
					display: flex;
					flex-direction: column;
					align-items: center;
					justify-content: center;
					background: #0D1117;
					border-radius: 20px;
					border: 2px solid transparent;
					background-image: linear-gradient(#0D1117, #0D1117), linear-gradient(135deg, #BB86FC, #03DAC6, #BB86FC);
					background-origin: border-box;
					background-clip: padding-box, border-box;
					background-size: 400% 400%;
					animation: rotate 6s ease infinite;
					box-shadow: 0 0 30px rgba(187, 134, 252, 0.2);
				}
				h1 {
					font-size: 50px;
					margin: 0;
					background: linear-gradient(135deg, #BB86FC, #03DAC6);
					-webkit-background-clip: text;
					-webkit-text-fill-color: transparent;
					animation: pulse 3s infinite;
				}
				p {
					color: #A9B1D6;
					font-size: 18px;
					margin-top: 10px;
					letter-spacing: 2px;
					text-transform: uppercase;
				}
			</style>
			<div class="container">
				<h1>✦ TOXIC ✦</h1>
				<p>Lead Architect @ Elara Bot</p>
			</div>
		</div>
	</foreignObject>
</svg>
